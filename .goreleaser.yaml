# -------------------------------------------------------------------------------
# Flight Fetcher - GoReleaser Configuration
#
# Project: Flight Fetcher / Author: Alex Freidah
#
# Builds cross-platform binaries and creates GitHub Releases on tag push.
# Triggered by the release.yml GitHub Actions workflow.
# -------------------------------------------------------------------------------

version: 2

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: flight-fetcher
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native
