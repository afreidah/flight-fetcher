<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Fetcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #efe3e5; color: #4a4055; }
    h1 { padding: 1rem; font-size: 1.25rem; background: #f9e4e4; border-bottom: 1px solid #f0c6c6; color: #6b4c5a; margin-bottom: 1rem; }
    h1 .version { font-size: 0.8rem; color: #b89aa6; font-weight: 400; margin-left: 0.75rem; }
    h2 { font-size: 1rem; padding: 0.75rem 1rem 0.5rem; color: #8e7a8a; }
    #status { padding: 0.5rem 1rem; color: #a08e9a; font-size: 0.85rem; }

    .row {
      margin: 0 0.5rem 3px;
      background: #e8eef6;
      border: 1px solid #f0d4d8;
      border-radius: 8px;
      overflow: hidden;
    }
    .row-header {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      gap: 1rem;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .row-header:hover { background: #fdf0f2; }
    .row.expanded .row-header { border-bottom: 1px solid #f0d4d8; background: #fdf0f2; }
    .row-header .icao { font-weight: 600; color: #7ea8d4; min-width: 70px; }
    .row-header .callsign { color: #4a4055; min-width: 80px; }
    .row-header .field { color: #a08e9a; }
    .row-header .squawk-emergency { color: #d96b7c; font-weight: 600; }

    .row-detail {
      display: none;
      padding: 0.75rem;
      background: #fdf0f2;
    }
    .row.expanded .row-detail { display: block; }
    .row-detail table { width: 100%; border-collapse: collapse; }
    .row-detail td { padding: 0.3rem 0.75rem; }
    .row-detail td:first-child { color: #a08e9a; width: 160px; }
    .row-detail .section { color: #e8879a; font-weight: 600; padding-top: 0.5rem; }

    .squawk-row { border-color: #f0a8b0; }
    .squawk-row .row-header { color: #6b4c5a; }
    .squawk-row .icao { color: #d96b7c; }
  </style>
</head>
<body>
  <h1>Flight Fetcher<span class="version">{{VERSION}}</span></h1>
  <div id="squawk-section"></div>
  <div id="status">Loading...</div>
  <div id="flights"></div>

  <script>
    var expanded = null;

    async function loadFlights() {
      try {
        var resp = await fetch("/api/flights");
        var flights = await resp.json();
        document.getElementById("status").textContent = flights.length + " aircraft in range";
        var el = document.getElementById("flights");
        el.innerHTML = "";
        flights.sort(function(a, b) { return a.icao24.localeCompare(b.icao24); });
        flights.forEach(function(f) {
          var div = document.createElement("div");
          div.className = "row" + (expanded === f.icao24 ? " expanded" : "");
          div.innerHTML =
            '<div class="row-header" onclick="toggleFlight(\'' + esc(f.icao24) + '\')">' +
              '<span class="icao">' + esc(f.icao24) + '</span>' +
              '<span class="callsign">' + esc(f.callsign.trim() || "-") + '</span>' +
              '<span class="field">' + esc(f.origin_country || "-") + '</span>' +
              '<span class="field">Alt: ' + fmtFt(f.baro_altitude) + '</span>' +
              '<span class="field">Spd: ' + fmtMph(f.velocity) + '</span>' +
              '<span class="field">Hdg: ' + fmt(f.heading, "deg") + '</span>' +
              (f.squawk ? '<span class="field">' + squawkLabel(f.squawk) + '</span>' : '') +
            '</div>' +
            '<div class="row-detail" id="detail-' + esc(f.icao24) + '"></div>';
          el.appendChild(div);
        });
        if (expanded && !expanded.startsWith("squawk-")) loadDetail(expanded);
      } catch (e) {
        document.getElementById("status").textContent = "Error loading flights";
      }
    }

    async function toggleFlight(icao24) {
      if (expanded === icao24) { expanded = null; loadFlights(); return; }
      expanded = icao24;
      loadFlights();
    }

    async function loadDetail(icao24) {
      var el = document.getElementById("detail-" + icao24);
      if (!el) return;
      try {
        var resp = await fetch("/api/flights/" + encodeURIComponent(icao24));
        if (!resp.ok) return;
        var data = await resp.json();
        el.innerHTML = buildDetail(data);
      } catch (e) {
        el.innerHTML = "<em>Failed to load details</em>";
      }
    }

    function buildDetail(data) {
      var s = data.state;
      var t = '<table>';
      t += section("Flight State");
      t += row("ICAO24", s.icao24);
      t += row("Callsign", s.callsign.trim() || "-");
      t += row("Origin Country", s.origin_country);
      t += row("Latitude", s.latitude);
      t += row("Longitude", s.longitude);
      t += row("Baro Altitude", fmtFt(s.baro_altitude));
      t += row("Velocity", fmtMph(s.velocity));
      t += row("Heading", fmt(s.heading, "deg"));
      t += row("Vertical Rate", fmtFpm(s.vertical_rate));
      t += row("On Ground", s.on_ground);
      t += row("Squawk", squawkLabel(s.squawk));
      if (data.route) {
        var r = data.route;
        t += section("Route");
        t += row("From", r.dep_iata ? r.dep_iata + " - " + (r.dep_name || "") : "-");
        t += row("To", r.arr_iata ? r.arr_iata + " - " + (r.arr_name || "") : "-");
      }
      if (data.aircraft) {
        var a = data.aircraft;
        t += section("Aircraft Metadata");
        t += row("Registration", a.Registration || "-");
        t += row("Manufacturer", a.ManufacturerName || "-");
        t += row("Type", a.Type || "-");
        t += row("Operator", a.OperatorFlagCode || "-");
      }
      t += '</table>';
      return t;
    }

    var cachedAlerts = null;

    async function loadSquawkAlerts() {
      var el = document.getElementById("squawk-section");
      try {
        var resp = await fetch("/api/squawk-alerts");
        cachedAlerts = await resp.json();
        if (!cachedAlerts || cachedAlerts.length === 0) { el.innerHTML = ""; return; }
        var html = '<h2>Global Emergency Squawk Alerts (last 24h)</h2>';
        cachedAlerts.forEach(function(a, i) {
          var id = "squawk-" + i;
          var label = {"7500": "HIJACK", "7600": "RADIO FAILURE", "7700": "EMERGENCY"}[a.Squawk] || a.Squawk;
          var time = new Date(a.SeenAt).toLocaleString();
          var isExpanded = expanded === id;
          html += '<div class="row squawk-row' + (isExpanded ? ' expanded' : '') + '">' +
            '<div class="row-header" onclick="toggleSquawk(\'' + id + '\')">' +
              '<span class="icao squawk-emergency">' + esc(a.Squawk) + ' ' + esc(label) + '</span>' +
              '<span class="callsign">' + esc(a.Icao24) + '</span>' +
              (a.Callsign ? '<span class="field">' + esc(a.Callsign) + '</span>' : '') +
              '<span class="field">' + esc(time) + '</span>' +
              '<span class="field">Lat: ' + a.Lat.toFixed(2) + '</span>' +
              '<span class="field">Lon: ' + a.Lon.toFixed(2) + '</span>' +
            '</div>' +
            '<div class="row-detail" id="detail-' + id + '"></div>' +
          '</div>';
        });
        el.innerHTML = html;
        if (expanded && expanded.startsWith("squawk-")) {
          var idx = parseInt(expanded.split("-")[1]);
          if (cachedAlerts[idx]) loadSquawkDetail(expanded, cachedAlerts[idx]);
        }
      } catch (e) {
        el.innerHTML = "";
      }
    }

    function toggleSquawk(id) {
      if (expanded === id) { expanded = null; loadSquawkAlerts(); return; }
      expanded = id;
      loadSquawkAlerts();
    }

    async function loadSquawkDetail(id, alert) {
      var el = document.getElementById("detail-" + id);
      if (!el) return;
      var t = '<table>';
      t += section("Alert Details");
      t += row("ICAO24", alert.Icao24);
      t += row("Callsign", alert.Callsign || "-");
      t += row("Squawk", squawkLabel(alert.Squawk));
      t += row("Latitude", alert.Lat);
      t += row("Longitude", alert.Lon);
      t += row("Seen At", new Date(alert.SeenAt).toLocaleString());
      try {
        var metaResp = await fetch("/api/aircraft/" + encodeURIComponent(alert.Icao24));
        if (metaResp.ok) {
          var a = await metaResp.json();
          t += section("Aircraft Metadata");
          t += row("Registration", a.Registration || "-");
          t += row("Manufacturer", a.ManufacturerName || "-");
          t += row("Type", a.Type || "-");
          t += row("Operator", a.OperatorFlagCode || "-");
        }
      } catch (e) {}
      if (alert.Callsign) {
        try {
          var routeResp = await fetch("/api/routes/" + encodeURIComponent(alert.Callsign));
          if (routeResp.ok) {
            var r = await routeResp.json();
            t += section("Route");
            t += row("From", r.dep_iata ? r.dep_iata + " - " + (r.dep_name || "") : "-");
            t += row("To", r.arr_iata ? r.arr_iata + " - " + (r.arr_name || "") : "-");
          }
        } catch (e) {}
      }
      t += '</table>';
      el.innerHTML = t;
    }

    function row(label, val) {
      return '<tr><td>' + esc(label) + '</td><td>' + esc(String(val)) + '</td></tr>';
    }
    function section(name) {
      return '<tr><td class="section" colspan="2">' + esc(name) + '</td></tr>';
    }
    function fmt(v, unit) {
      return v != null && v !== 0 ? Math.round(v) + " " + unit : "-";
    }
    function fmtFt(m) {
      return m != null && m !== 0 ? Math.round(m * 3.28084).toLocaleString() + " ft" : "-";
    }
    function fmtMph(ms) {
      return ms != null && ms !== 0 ? Math.round(ms * 2.23694) + " mph" : "-";
    }
    function fmtFpm(ms) {
      return ms != null && ms !== 0 ? Math.round(ms * 196.85) + " ft/min" : "-";
    }
    function squawkLabel(code) {
      if (!code) return "-";
      var emergency = {"7500": "HIJACK", "7600": "RADIO FAILURE", "7700": "EMERGENCY"};
      var label = emergency[code];
      if (label) return '<span class="squawk-emergency">' + esc(code) + ' - ' + label + '</span>';
      return esc(code);
    }
    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    var refreshSec = {{REFRESH}};
    loadFlights();
    loadSquawkAlerts();
    setInterval(loadFlights, refreshSec * 1000);
    setInterval(loadSquawkAlerts, refreshSec * 6000);
  </script>
</body>
</html>
