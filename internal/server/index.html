<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Fetcher</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #efe3e5; color: #4a4055; display: flex; flex-direction: column; }

    header { padding: 0.75rem 1rem; background: #f9e4e4; border-bottom: 1px solid #f0c6c6; color: #6b4c5a; font-size: 1.25rem; font-weight: 700; flex-shrink: 0; }
    header .version { font-size: 0.8rem; color: #b89aa6; font-weight: 400; margin-left: 0.75rem; }
    header .status { float: right; font-size: 0.85rem; color: #a08e9a; font-weight: 400; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* Left pane: flight list */
    .left { width: 40%; overflow-y: auto; padding: 0.5rem; flex-shrink: 0; }

    .row {
      margin-bottom: 3px;
      background: #e8eef6;
      border: 1px solid #f0d4d8;
      border-radius: 8px;
      overflow: hidden;
    }
    .col-headers {
      display: flex;
      padding: 0.25rem 0.75rem;
      gap: 0;
      font-size: 0.75rem;
      color: #8e7a8a;
      cursor: pointer;
      user-select: none;
    }
    .col-headers span:hover { color: #6b4c5a; }
    .col-headers .sort-active { color: #e8879a; font-weight: 600; }
    .col-headers .col-icao { width: 75px; flex-shrink: 0; }
    .col-headers .col-callsign { width: 80px; flex-shrink: 0; }
    .col-headers .col-country { width: 100px; flex-shrink: 0; }
    .col-headers .col-alt { width: 90px; flex-shrink: 0; }
    .col-headers .col-spd { width: 80px; flex-shrink: 0; }
    .col-headers .col-squawk { flex: 1; }

    .row-header {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      gap: 0;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .row-header:hover { background: #fdf0f2; }
    .row.selected .row-header { background: #fdf0f2; border-left: 3px solid #7ea8d4; }
    .row-header .icao { font-weight: 600; color: #7ea8d4; width: 75px; flex-shrink: 0; }
    .row-header .callsign { color: #4a4055; width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-header .col-country { color: #a08e9a; width: 100px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-header .col-alt { color: #a08e9a; width: 90px; flex-shrink: 0; }
    .row-header .col-spd { color: #a08e9a; width: 80px; flex-shrink: 0; }
    .row-header .col-squawk { color: #a08e9a; flex: 1; }
    .row-header .squawk-emergency { color: #d96b7c; font-weight: 600; }

    .squawk-row { border-color: #f0a8b0; }
    .squawk-row .row-header { color: #6b4c5a; }
    .squawk-row .icao { color: #d96b7c; }

    h2.section-title { font-size: 0.9rem; padding: 0.5rem 0.5rem 0.25rem; color: #8e7a8a; }

    /* Right pane: map + detail */
    .right { flex: 1; overflow-y: auto; border-left: 1px solid #f0c6c6; }
    #map { height: 450px; }
    #detail { padding: 0.75rem; }
    #detail:empty { display: none; }
    #detail table { border-collapse: collapse; }
    #detail td { padding: 0.3rem 0.75rem; font-size: 0.85rem; }
    #detail td:first-child { color: #a08e9a; width: 150px; }
    #detail .section { color: #e8879a; font-weight: 600; padding-top: 0.5rem; }
    #detail .none { color: #a08e9a; font-style: italic; padding: 1rem; text-align: center; }
    .class-badge { display: inline-block; color: #fff; font-size: 0.65rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; letter-spacing: 0.5px; }
    .class-military { background: #5b7a3a; }
    .class-law_enforcement { background: #3a5a8c; }
    .class-emergency { background: #c44; }
  </style>
</head>
<body>
  <header>
    Flight Fetcher<span class="version">{{VERSION}}</span>
    <span class="status" id="status">Loading...</span>
  </header>
  <div class="main">
    <div class="left">
      <div id="squawk-section"></div>
      <div class="col-headers" id="col-headers">
        <span class="col-icao sort-active" onclick="setSort('icao24')">ICAO24</span>
        <span class="col-callsign" onclick="setSort('callsign')">Callsign</span>
        <span class="col-country" onclick="setSort('country')">Country</span>
        <span class="col-alt" onclick="setSort('alt')">Altitude</span>
        <span class="col-spd" onclick="setSort('spd')">Speed</span>
        <span class="col-squawk" onclick="setSort('squawk')">Squawk</span>
      </div>
      <div id="flights"></div>
    </div>
    <div class="right">
      <div id="map"></div>
      <div id="detail"></div>
    </div>
  </div>

  <script>
    var selected = null;
    var cachedFlights = [];
    var flightMap = {};
    var map = null;
    var markers = {};
    var selectedMarker = null;

    // Military ICAO24 hex ranges from tar1090-db
    var milRanges = [
      [0xadf7c8,0xafffff],[0x010070,0x01008f],[0x0a4000,0x0a4fff],
      [0x33ff00,0x33ffff],[0x350000,0x37ffff],[0x3aa000,0x3affff],
      [0x3b7000,0x3bffff],[0x3ea000,0x3ebfff],[0x3f4000,0x3fbfff],
      [0x400000,0x40003f],[0x43c000,0x43cfff],[0x444000,0x446fff],
      [0x44f000,0x44ffff],[0x457000,0x457fff],[0x45f400,0x45f4ff],
      [0x468000,0x4683ff],[0x473c00,0x473c0f],[0x478100,0x4781ff],
      [0x480000,0x480fff],[0x48d800,0x48d87f],[0x497c00,0x497cff],
      [0x498420,0x49842f],[0x4b7000,0x4b7fff],[0x4b8200,0x4b82ff],
      [0x70c070,0x70c07f],[0x710258,0x71028f],[0x710380,0x71039f],
      [0x738a00,0x738aff],[0x7cf800,0x7cfaff],[0x800200,0x8002ff],
      [0xc20000,0xc3ffff],[0xe40000,0xe41fff]
    ];
    // Client-side classification — only military is detectable from hex ranges.
    // LE/EMS require owner data and are shown after clicking (via API).
    function clientClassify(icao24) {
      var v = parseInt(icao24, 16);
      if (isNaN(v)) return "";
      for (var i = 0; i < milRanges.length; i++) {
        if (v >= milRanges[i][0] && v <= milRanges[i][1]) return "military";
      }
      return "";
    }

    // Initialize the persistent map
    function initMap() {
      map = L.map("map").setView([34.0928, -118.3287], 9);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);
    }

    var sortField = "icao24";
    var sortDir = 1;

    function setSort(field) {
      if (sortField === field) {
        sortDir *= -1;
      } else {
        sortField = field;
        sortDir = 1;
      }
      // Update header highlights
      document.querySelectorAll(".col-headers span").forEach(function(s) {
        s.classList.remove("sort-active");
      });
      var cls = {"icao24":"col-icao","callsign":"col-callsign","country":"col-country","alt":"col-alt","spd":"col-spd","squawk":"col-squawk"};
      var active = document.querySelector(".col-headers ." + cls[field]);
      if (active) active.classList.add("sort-active");
      // Re-sort DOM without refetching
      var el = document.getElementById("flights");
      var sorted = sortFlights(cachedFlights);
      sorted.forEach(function(f) {
        var row = el.querySelector('.row[data-icao="' + f.icao24 + '"]');
        if (row) el.appendChild(row);
      });
    }

    function sortFlights(flights) {
      return flights.slice().sort(function(a, b) {
        var va, vb;
        switch (sortField) {
          case "icao24": va = a.icao24; vb = b.icao24; break;
          case "callsign": va = a.callsign.trim(); vb = b.callsign.trim(); break;
          case "country": va = a.origin_country || ""; vb = b.origin_country || ""; break;
          case "alt": va = a.baro_altitude || 0; vb = b.baro_altitude || 0; return (va - vb) * sortDir;
          case "spd": va = a.velocity || 0; vb = b.velocity || 0; return (va - vb) * sortDir;
          case "squawk": va = a.squawk || ""; vb = b.squawk || ""; break;
          default: va = a.icao24; vb = b.icao24;
        }
        return va < vb ? -sortDir : va > vb ? sortDir : 0;
      });
    }

    function classBadge(cls) {
      var labels = {"military": "MIL", "law_enforcement": "LE", "emergency": "EMS"};
      if (!labels[cls]) return "";
      return ' <span class="class-badge class-' + cls + '">' + labels[cls] + '</span>';
    }

    function buildHeader(f) {
      var badge = classBadge(clientClassify(f.icao24));
      return '<span class="icao">' + esc(f.icao24) + badge + '</span>' +
        '<span class="callsign">' + esc(f.callsign.trim() || "-") + '</span>' +
        '<span class="col-country">' + esc(f.origin_country || "-") + '</span>' +
        '<span class="col-alt">' + fmtFt(f.baro_altitude) + '</span>' +
        '<span class="col-spd">' + fmtMph(f.velocity) + '</span>' +
        '<span class="col-squawk">' + (f.squawk ? squawkLabel(f.squawk) : '') + '</span>';
    }

    function planeIcon(heading, isSelected, cls) {
      var classColors = {"military": "#5b7a3a", "law_enforcement": "#3a5a8c", "emergency": "#c44"};
      var color = isSelected ? "#d96b7c" : classColors[cls] || "#7ea8d4";
      var size = isSelected ? 24 : 18;
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" ' +
        'style="transform:rotate(' + (heading || 0) + 'deg)">' +
        '<path d="M12 2L8 10H3l2 4h5l-2 6h2l4-4 4 4h2l-2-6h5l2-4h-5L12 2z" fill="' + color + '"/></svg>';
      return L.divIcon({
        html: svg,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
        className: ""
      });
    }

    // Update markers on the map for all flights
    function updateMarkers(flights) {
      var current = {};
      flights.forEach(function(f) {
        current[f.icao24] = true;
        var pos = [f.latitude, f.longitude];
        var isSel = f.icao24 === selected;
        if (markers[f.icao24]) {
          markers[f.icao24].setLatLng(pos);
          markers[f.icao24].setIcon(planeIcon(f.heading, isSel, clientClassify(f.icao24)));
        } else {
          markers[f.icao24] = L.marker(pos, { icon: planeIcon(f.heading, isSel, clientClassify(f.icao24)) }).addTo(map);
          markers[f.icao24].on("click", function() { selectFlight(f.icao24); });
        }
        markers[f.icao24].bindTooltip(esc(f.callsign.trim() || f.icao24), { direction: "top", offset: [0, -10] });
      });
      // Remove markers for departed aircraft
      Object.keys(markers).forEach(function(icao) {
        if (!current[icao]) {
          map.removeLayer(markers[icao]);
          delete markers[icao];
        }
      });
    }

    async function loadFlights() {
      try {
        var resp = await fetch("/api/flights");
        var flights = await resp.json();
        if (flights.length === 0 && cachedFlights.length > 0) {
          document.getElementById("status").textContent = cachedFlights.length + " aircraft (stale)";
          return;
        }
        cachedFlights = flights;
        flightMap = {};
        flights.forEach(function(f) { flightMap[f.icao24] = f; });
        document.getElementById("status").textContent = flights.length + " aircraft in range";

        var el = document.getElementById("flights");
        flights = sortFlights(flights);

        var current = {};
        flights.forEach(function(f) { current[f.icao24] = f; });

        // Remove rows for aircraft that left
        var existing = el.querySelectorAll(".row[data-icao]");
        existing.forEach(function(row) {
          if (!current[row.dataset.icao]) row.remove();
        });

        // Update existing or add new
        flights.forEach(function(f) {
          var row = el.querySelector('.row[data-icao="' + f.icao24 + '"]');
          if (row) {
            var header = row.querySelector(".row-header");
            if (header) header.innerHTML = buildHeader(f);
          } else {
            row = document.createElement("div");
            row.className = "row";
            row.dataset.icao = f.icao24;
            row.innerHTML =
              '<div class="row-header" onclick="selectFlight(\'' + esc(f.icao24) + '\')">' +
                buildHeader(f) +
              '</div>';
            el.appendChild(row);
          }
          if (selected === f.icao24) {
            row.classList.add("selected");
          } else {
            row.classList.remove("selected");
          }
        });

        // Re-sort
        flights.forEach(function(f) {
          var row = el.querySelector('.row[data-icao="' + f.icao24 + '"]');
          if (row) el.appendChild(row);
        });

        // Update map markers
        updateMarkers(flights);
      } catch (e) {
        document.getElementById("status").textContent = "Error loading flights";
      }
    }

    function selectFlight(icao24) {
      var el = document.getElementById("flights");
      // Clean up squawk marker if present
      if (markers["_squawk"]) { map.removeLayer(markers["_squawk"]); delete markers["_squawk"]; }
      // Deselect previous
      if (selected) {
        var prev = el.querySelector('.row[data-icao="' + selected + '"]');
        if (prev) prev.classList.remove("selected");
        var prevFlight = flightMap[selected];
        if (markers[selected] && prevFlight) {
          markers[selected].setIcon(planeIcon(prevFlight.heading, false, clientClassify(selected)));
        }
      }
      if (selected === icao24) {
        selected = null;
        document.getElementById("detail").innerHTML = "";
        return;
      }
      selected = icao24;
      var row = el.querySelector('.row[data-icao="' + icao24 + '"]');
      if (row) row.classList.add("selected");
      // Highlight marker and pan
      var f = flightMap[icao24];
      if (markers[icao24] && f) {
        markers[icao24].setIcon(planeIcon(f.heading, true, clientClassify(icao24)));
        map.panTo(markers[icao24].getLatLng());
      }
      loadDetail(icao24);
    }

    async function loadDetail(icao24) {
      var el = document.getElementById("detail");
      try {
        var resp = await fetch("/api/flights/" + encodeURIComponent(icao24));
        var data;
        if (resp.ok) {
          data = await resp.json();
        } else if (flightMap[icao24]) {
          data = { state: flightMap[icao24] };
        } else {
          el.innerHTML = '<div class="none">No detail available</div>';
          return;
        }
        el.innerHTML = buildDetail(data);
      } catch (e) {
        el.innerHTML = '<div class="none">Failed to load details</div>';
      }
    }

    function buildDetail(data) {
      var s = data.state;
      var imgURL = data.aircraft ? data.aircraft.image_url : "";
      var t = '<div style="display:flex;gap:1rem;align-items:flex-start">';
      t += '<table style="flex-shrink:0">';
      t += section("Flight State");
      t += rowHTML("ICAO24", esc(s.icao24) + classBadge(data.classification));
      t += row("Callsign", s.callsign.trim() || "-");
      t += row("Origin Country", s.origin_country);
      t += row("Latitude", s.latitude);
      t += row("Longitude", s.longitude);
      t += row("Baro Altitude", fmtFt(s.baro_altitude));
      t += row("Velocity", fmtMph(s.velocity));
      t += row("Heading", fmt(s.heading, "deg"));
      t += row("Vertical Rate", fmtFpm(s.vertical_rate));
      t += row("On Ground", s.on_ground);
      t += rowHTML("Squawk", squawkLabel(s.squawk));
      if (data.route) {
        var r = data.route;
        t += section("Route");
        t += row("From", r.dep_iata ? r.dep_iata + " - " + (r.dep_name || "") : "-");
        t += row("To", r.arr_iata ? r.arr_iata + " - " + (r.arr_name || "") : "-");
      }
      if (data.aircraft) {
        var a = data.aircraft;
        t += section("Aircraft Metadata");
        t += row("Registration", a.registration || "-");
        t += row("Manufacturer", a.manufacturer_name || "-");
        t += row("Type", a.type || "-");
        t += row("ICAO Type Code", a.icao_type_code || "-");
        t += row("Owner", a.registered_owners || "-");
        t += row("Operator", a.operator_flag_code || "-");
      }
      t += '</table>';
      if (imgURL) {
        t += '<div style="flex:1"><img src="' + esc(imgURL) + '" alt="Aircraft photo" style="width:100%;border-radius:6px" onerror="this.parentElement.style.display=\'none\'"></div>';
      }
      t += '</div>';
      return t;
    }

    var cachedAlerts = null;

    async function loadSquawkAlerts() {
      var el = document.getElementById("squawk-section");
      try {
        var resp = await fetch("/api/squawk-alerts");
        cachedAlerts = await resp.json();
        if (!cachedAlerts || cachedAlerts.length === 0) { el.innerHTML = ""; return; }
        var html = '<h2 class="section-title">Global Emergency Squawk Alerts (last 24h)</h2>';
        cachedAlerts.forEach(function(a, i) {
          var id = "squawk-" + i;
          var label = {"7500": "HIJACK", "7600": "RADIO FAILURE", "7700": "EMERGENCY"}[a.squawk] || a.squawk;
          var time = new Date(a.seen_at).toLocaleString();
          html += '<div class="row squawk-row' + (selected === id ? ' selected' : '') + '">' +
            '<div class="row-header" onclick="selectSquawk(\'' + id + '\')">' +
              '<span class="icao squawk-emergency" style="width:140px;flex-shrink:0">' + esc(a.squawk) + ' ' + esc(label) + '</span>' +
              '<span class="callsign">' + esc(a.icao24) + '</span>' +
              '<span class="col-country">' + esc(a.callsign || "-") + '</span>' +
              '<span class="col-squawk">' + esc(time) + '</span>' +
            '</div>' +
          '</div>';
        });
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = "";
      }
    }

    function selectSquawk(id) {
      if (selected === id) {
        selected = null;
        document.getElementById("detail").innerHTML = "";
        if (markers["_squawk"]) { map.removeLayer(markers["_squawk"]); delete markers["_squawk"]; }
        loadSquawkAlerts();
        return;
      }
      // Deselect any flight
      if (selected) {
        var prev = document.querySelector('.row.selected');
        if (prev) prev.classList.remove("selected");
        var prevFlight = flightMap[selected];
        if (markers[selected] && prevFlight) {
          markers[selected].setIcon(planeIcon(prevFlight.heading, false, clientClassify(selected)));
        }
      }
      selected = id;
      loadSquawkAlerts();
      var idx = parseInt(id.split("-")[1]);
      if (cachedAlerts && cachedAlerts[idx]) {
        var alert = cachedAlerts[idx];
        loadSquawkDetail(alert);
        // Add a temporary marker for the squawk alert location
        if (alert.lat && alert.lon) {
          if (markers["_squawk"]) map.removeLayer(markers["_squawk"]);
          markers["_squawk"] = L.marker([alert.lat, alert.lon], {
            icon: planeIcon(0, true, clientClassify(alert.icao24))
          }).addTo(map);
          map.panTo([alert.lat, alert.lon]);
          map.setZoom(6);
        }
      }
    }

    async function loadSquawkDetail(alert) {
      var el = document.getElementById("detail");
      var t = '<table>';
      t += section("Alert Details");
      t += row("ICAO24", alert.icao24);
      t += row("Callsign", alert.callsign || "-");
      t += rowHTML("Squawk", squawkLabel(alert.squawk));
      t += row("Latitude", alert.lat);
      t += row("Longitude", alert.lon);
      t += row("Seen At", new Date(alert.seen_at).toLocaleString());
      try {
        var metaResp = await fetch("/api/aircraft/" + encodeURIComponent(alert.icao24));
        if (metaResp.ok) {
          var a = await metaResp.json();
          t += '<tr><td colspan="2" style="padding:0"><div style="display:flex;gap:1rem;padding:0.5rem 0.75rem;align-items:flex-start">';
          t += '<div>';
          t += '<table>';
          t += section("Aircraft Metadata");
          t += row("Registration", a.registration || "-");
          t += row("Manufacturer", a.manufacturer_name || "-");
          t += row("Type", a.type || "-");
          t += row("ICAO Type Code", a.icao_type_code || "-");
          t += row("Owner", a.registered_owners || "-");
          t += row("Operator", a.operator_flag_code || "-");
          t += '</table></div>';
          if (a.image_url) {
            t += '<div style="flex:1"><img src="' + esc(a.image_url) + '" alt="Aircraft photo" style="width:100%;border-radius:6px" onerror="this.parentElement.style.display=\'none\'"></div>';
          }
          t += '</div></td></tr>';
        }
      } catch (e) {}
      if (alert.callsign) {
        try {
          var routeResp = await fetch("/api/routes/" + encodeURIComponent(alert.callsign));
          if (routeResp.ok) {
            var r = await routeResp.json();
            t += section("Route");
            t += row("From", r.dep_iata ? r.dep_iata + " - " + (r.dep_name || "") : "-");
            t += row("To", r.arr_iata ? r.arr_iata + " - " + (r.arr_name || "") : "-");
          }
        } catch (e) {}
      }
      t += '</table>';
      el.innerHTML = t;
      // Pan map to alert location
      if (alert.lat && alert.lon) {
        map.panTo([alert.lat, alert.lon]);
        map.setZoom(6);
      }
    }

    function row(label, val) {
      return '<tr><td>' + esc(label) + '</td><td>' + esc(String(val)) + '</td></tr>';
    }
    function rowHTML(label, html) {
      return '<tr><td>' + esc(label) + '</td><td>' + html + '</td></tr>';
    }
    function section(name) {
      return '<tr><td class="section" colspan="2">' + esc(name) + '</td></tr>';
    }
    function fmt(v, unit) {
      return v != null && v !== 0 ? Math.round(v) + " " + unit : "-";
    }
    function fmtFt(m) {
      return m != null && m !== 0 ? Math.round(m * 3.28084).toLocaleString() + " ft" : "-";
    }
    function fmtMph(ms) {
      return ms != null && ms !== 0 ? Math.round(ms * 2.23694) + " mph" : "-";
    }
    function fmtFpm(ms) {
      return ms != null && ms !== 0 ? Math.round(ms * 196.85) + " ft/min" : "-";
    }
    function squawkLabel(code) {
      if (!code) return "-";
      var emergency = {"7500": "HIJACK", "7600": "RADIO FAILURE", "7700": "EMERGENCY"};
      var label = emergency[code];
      if (label) return '<span class="squawk-emergency">' + esc(code) + ' - ' + label + '</span>';
      return esc(code);
    }
    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    initMap();
    var refreshSec = {{REFRESH}};
    loadFlights();
    loadSquawkAlerts();
    setInterval(loadFlights, refreshSec * 1000);
    setInterval(loadSquawkAlerts, refreshSec * 6000);
  </script>
</body>
